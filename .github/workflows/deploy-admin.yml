name: Deploy Admin Web to Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - 'SmartBrewAdminWeb/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SmartBrewAdminWeb/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: SmartBrewAdminWeb

      - name: Build
        run: npm run build
        working-directory: SmartBrewAdminWeb

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMARTBREW_POS }}
          projectId: smartbrew-pos
          target: admin
          channelId: live
